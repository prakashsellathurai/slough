name: Publish to PyPI

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check if version changed
        id: version-check
        run: |
          old_version=$(git show HEAD~1:pyproject.toml 2>/dev/null | grep '^version = ' | sed 's/version = "\(.*\)"/\1/' || echo "none")
          new_version=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          echo "old=$old_version" >> "$GITHUB_OUTPUT"
          echo "new=$new_version" >> "$GITHUB_OUTPUT"
          [ "$old_version" != "$new_version" ] && echo "changed=true" >> "$GITHUB_OUTPUT" || echo "changed=false" >> "$GITHUB_OUTPUT"
      - run: uv build
        if: steps.version-check.outputs.changed == 'true'
      - run: uv publish
        if: steps.version-check.outputs.changed == 'true'
      - name: Create Git Tag
        if: steps.version-check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.version-check.outputs.new }}" -m "Release v${{ steps.version-check.outputs.new }}"
          git push origin "v${{ steps.version-check.outputs.new }}"
      - name: Create GitHub Release
        if: steps.version-check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.version-check.outputs.new }}" \
            --generate-notes \
            --title "v${{ steps.version-check.outputs.new }}"
